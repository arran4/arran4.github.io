name: GitHub Pages

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

on:
  push:
    branches:
      - main  # Set a branch name to trigger deployment
  pull_request:
  schedule:
    - cron: '5 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff_check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.147.8'
          extended: true
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      - name: Cache stars data
        id: cache-stars
        uses: actions/cache@v4
        with:
          path: data/stars.json
          key: ${{ runner.os }}-stars

      - name: Fetch Stars
        id: fetch_stars
        run: |
          sudo apt-get update && sudo apt-get install -y yq jq

          if [ -f "data/stars.json" ]; then
            mv data/stars.json /tmp/stars.json.old
          fi

          STARS_FILE="data/stars.json"
          echo "{}" > "$STARS_FILE"

          for repo_url in $(yq '.projects[].repo' data/en/sections/projects.yaml | tr -d '"'); do
            if [[ "$repo_url" == "null" ]]; then
              continue
            fi
            repo_path=$(echo "$repo_url" | sed 's|https://github.com/||')

            stars=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/$repo_path" | jq '.stargazers_count')

            tmpfile=$(mktemp)
            jq --arg repo "$repo_path" --argjson stars "$stars" '.[$repo] = $stars' "$STARS_FILE" > "$tmpfile" && mv "$tmpfile" "$STARS_FILE"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Diff check
        id: diff_check
        run: |
          if [ -f "/tmp/stars.json.old" ]; then
            if diff -q data/stars.json /tmp/stars.json.old; then
              echo "Stars have not changed."
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "Stars have changed."
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "No old stars file found."
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Everything required
        if: ${{ steps.diff_check.outputs.changed == 'true' || github.event_name == 'pull_request' }}
        run: |
          export HUGO_CACHEDIR=${{ runner.temp }}/hugo_cache
          mkdir -p ${{ runner.temp }}/hugo_cache
          hugo mod npm pack
          npm install @popperjs/core@2.11.8 include-media@1.4.10 --save-dev --legacy-peer-deps
          npm install --legacy-peer-deps
          sudo rm -rf public/
          export HUGO_CACHEDIR=${{ runner.temp }}/hugo_cache
          mkdir -p $HUGO_CACHEDIR
          chmod -R u+w $HUGO_CACHEDIR
          hugo --minify --templateMetrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        if: ${{ github.ref == 'refs/heads/main' && (steps.diff_check.outputs.changed == 'true' || github.event_name == 'pull_request') }}
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.ref == 'refs/heads/main' && (needs.build.outputs.changed == 'true' || github.event_name == 'pull_request') }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
